# Put It Out There — release orchestration config.
# Docs: https://github.com/thekevinscott/put-it-out-there

[putitoutthere]
version = 1

[[package]]
name = "coaxer"
kind = "pypi"
path = "."
paths = ["coaxer/**", "pyproject.toml", "CHANGELOG.md"]
build = "hatch"
# Pre-putitoutthere releases used unprefixed `v{version}` tags (latest: v0.2.12).
# Override the default `{name}-v{version}` so the planner keeps bumping from
# that history instead of starting over at first_version.
tag_format = "v{version}"
first_version = "0.1.0"
