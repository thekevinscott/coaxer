name: Migrations

on:
  pull_request:

jobs:
  migrations:
    runs-on: ubuntu-latest
    env:
      BASE_REF: ${{ github.base_ref }}
      PR_BODY: ${{ github.event.pull_request.body }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Require MIGRATIONS.md update on every PR
        run: |
          git fetch origin "$BASE_REF" --depth=1

          # Trailer sources: every commit message in the PR range, plus the PR body
          # (so "Squash and merge" works — body becomes the squashed commit body).
          trailers="$({ git log --format=%B "origin/$BASE_REF..HEAD"; printf '%s\n' "$PR_BODY"; } 2>/dev/null)"

          if printf '%s\n' "$trailers" | grep -qiE '^[[:space:]]*skip-migration:[[:space:]]*true[[:space:]]*$'; then
            echo "skip-migration: true trailer present; bypassing MIGRATIONS.md requirement."
            exit 0
          fi

          if git diff --name-only "origin/$BASE_REF...HEAD" | grep -qx MIGRATIONS.md; then
            echo "MIGRATIONS.md updated"
          else
            echo "::error::MIGRATIONS.md must be updated in every PR, parallel to CHANGELOG.md. For PRs with no consumer-facing impact, add the no-change shorthand under ## Unreleased (see AGENTS.md). For consumer-facing changes, use the full 5-section template. Bypass with 'skip-migration: true' as a trailer on any commit or in the PR body (rare — only for CHANGELOG-only follow-ups where even the shorthand is redundant)."
            exit 1
          fi
