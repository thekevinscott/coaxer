name: Backfill GitHub Releases

# Manual one-off (or rare) backfill: walks every tag matching the glob and
# creates a corresponding GitHub Release for any that don't already have one.
# Used to seed Releases for tags created before release.yml learned how to
# call `gh release create` (#35), and as a safety net if a future release
# pipeline run tags but doesn't manage to publish the Release for any reason.
#
# Trigger: GitHub UI → Actions → "Backfill GitHub Releases" → Run workflow.

on:
  workflow_dispatch:
    inputs:
      tag_glob:
        description: 'Tag glob to backfill (e.g. "v*", "v0.2.*", "v0.3.1"). Defaults to all v* tags.'
        type: string
        required: false
        default: 'v*'
      dry_run:
        description: 'Dry-run: list tags that would be created, take no action.'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Backfill GitHub Releases for matching tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_GLOB: ${{ inputs.tag_glob }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          git fetch --tags origin
          # sort -V processes tags in version order so each `gh release create`
          # call can use the previous Release as the diff base for --generate-notes.
          mapfile -t tags < <(git tag -l "$TAG_GLOB" | sort -V)
          if [ ${#tags[@]} -eq 0 ]; then
            echo "::notice::No tags matching '$TAG_GLOB'."
            exit 0
          fi
          created=0
          skipped=0
          for tag in "${tags[@]}"; do
            if gh release view "$tag" >/dev/null 2>&1; then
              echo "  skip $tag (Release already exists)"
              skipped=$((skipped + 1))
              continue
            fi
            if [ "$DRY_RUN" = "true" ]; then
              echo "  would create $tag (dry-run)"
              created=$((created + 1))
              continue
            fi
            gh release create "$tag" --title "$tag" --generate-notes
            echo "  created $tag"
            created=$((created + 1))
          done
          echo "::notice::Backfill summary: $created created, $skipped skipped."
