name: Changelog

on:
  pull_request:

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Require CHANGELOG.md update
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -qx CHANGELOG.md; then
            echo "CHANGELOG.md updated"
          else
            echo "::error::CHANGELOG.md must be updated in every PR. Add an entry under ## Unreleased (see .claude/CLAUDE.md for the format)."
            exit 1
          fi
