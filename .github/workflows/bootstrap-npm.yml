name: Bootstrap npm publish (one-shot)

# putitoutthere uses OIDC trusted publishers exclusively, but npm doesn't
# support pending TPs — the package has to exist before a TP can be
# registered against it. This workflow publishes the very first version
# using a long-lived NPM_TOKEN, so the package exists; afterwards the
# TP is registered, NPM_TOKEN is removed, and every subsequent release
# goes through putitoutthere's OIDC path.
#
# Steps for the human after merging PR #57:
#   1. Trigger this workflow with version=0.1.0
#   2. Visit https://www.npmjs.com/package/coaxer/access and add a
#      GitHub Actions trusted publisher pointing at this repo /
#      .github/workflows/release.yml with environment "release"
#   3. Delete the NPM_TOKEN repo secret
#   4. (Optional) Delete this workflow file in a follow-up PR
#
# Future releases use `release: <bump> [coaxer-js]` trailers and run
# through putitoutthere's reusable workflow, no NPM_TOKEN needed.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (semver, no `v` prefix)'
        required: true
        default: '0.1.0'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: packages/javascript
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: 'packages/javascript/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Set package version
        run: npm version "${{ inputs.version }}" --no-git-tag-version

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag the bootstrap commit
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "coaxer-js-v${{ inputs.version }}"
          git push origin "coaxer-js-v${{ inputs.version }}"
