name: Putitoutthere check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # Upstream putitoutthere has two entry-point bugs:
      # 1. The GHA bundle merges the CLI guard with the action wrapper's
      #    guard; CLI fires first and the wrapper never runs.
      # 2. The CLI itself compares `import.meta.url` to
      #    `file://${process.argv[1]}`, and node resolves symlinks on
      #    import.meta.url but not on argv[1] — so `npx`/`npm i -g`
      #    invocations (which go through a bin symlink) silently exit 0
      #    with zero stdout.
      # Workaround: `npm install -g` + `node $(npm root -g)/.../cli.js`.
      - run: |
          npm install -g putitoutthere@0.1.36
          node "$(npm root -g)/putitoutthere/dist/cli.js" plan --dry-run
