name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run: compute plan, skip publish + tag'
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # Upstream putitoutthere has two entry-point bugs we work around:
      #
      # 1. The GitHub Action bundle (`thekevinscott/put-it-out-there@*`)
      #    is broken in all published tags — ncc merges the CLI guard
      #    and the action wrapper's guard into one file, so the CLI
      #    guard fires first and exits before the wrapper runs.
      # 2. The CLI's own entry-point guard compares `import.meta.url`
      #    to `file://${process.argv[1]}`, but node resolves symlinks
      #    for import.meta.url and NOT for argv[1]. `npx -y <pkg>` and
      #    `npm install -g <pkg>` both invoke the CLI via a bin symlink,
      #    so the guard is false, `main()` never runs, and the process
      #    silently exits 0 with zero bytes of stdout.
      #
      # Workaround: `npm install -g` to lay the files down, then invoke
      # via `node $(npm root -g)/putitoutthere/dist/cli.js` — that's a
      # non-symlinked path so argv[1] and import.meta.url match.
      #
      # `tee plan.json` + `test -s plan.json` remains so any future
      # silent-empty regression trips the step instead of succeeding.
      - id: plan
        run: |
          npm install -g putitoutthere@0.1.36
          node "$(npm root -g)/putitoutthere/dist/cli.js" plan --json | tee plan.json
          test -s plan.json

  build:
    needs: plan
    if: fromJSON(needs.plan.outputs.matrix || '[]')[0] != null
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.matrix) }}
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Rust (if crates)
        if: matrix.kind == 'crates'
        uses: dtolnay/rust-toolchain@stable
      - name: Build crate
        if: matrix.kind == 'crates'
        run: cargo package --manifest-path ${{ matrix.path }}/Cargo.toml --target-dir ${{ matrix.path }}/target
      - name: Setup Python (if pypi)
        if: matrix.kind == 'pypi'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build wheel (maturin)
        if: matrix.kind == 'pypi' && matrix.build == 'maturin'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out ${{ matrix.path }}/dist ${{ matrix.target == 'sdist' && '--sdist' || format('--target {0}', matrix.target) }}
          working-directory: ${{ matrix.path }}
      - name: Build sdist (setuptools/hatch)
        if: matrix.kind == 'pypi' && matrix.build != 'maturin' && matrix.target == 'sdist'
        run: |
          cd ${{ matrix.path }}
          python -m pip install build
          python -m build --sdist --outdir dist
      - name: Setup Node (if npm)
        if: matrix.kind == 'npm'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build npm package
        if: matrix.kind == 'npm'
        run: |
          cd ${{ matrix.path }}
          npm ci
          npm run build --if-present
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

  publish:
    needs: [plan, build]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      # putitoutthere shells out to `twine upload` for the actual PyPI
      # push, so the publish runner needs Python + twine on PATH.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install twine
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      # putitoutthere creates annotated tags (`git tag -a`), which
      # require committer identity. Hosted runners have none by default.
      - name: Configure git identity for tagging
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
      # See plan job note: install via npm + invoke via node+resolved path
      # to side-step the upstream symlink entry-point bug.
      - run: |
          npm install -g putitoutthere@0.1.36
          node "$(npm root -g)/putitoutthere/dist/cli.js" publish ${{ inputs.dry_run && '--dry-run' || '' }}
        env:
          # NODE_AUTH_TOKEN (not NPM_TOKEN) matches the .npmrc template that
          # actions/setup-node writes when registry-url is set. putitoutthere's
          # preflight also accepts NPM_TOKEN as a fallback, but npm itself
          # reads this name. Store your npm secret under any name — we map it
          # here.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
