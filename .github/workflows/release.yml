name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run: compute plan, skip publish + tag'
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      # `tee plan.json` + `test -s plan.json` guards against a silent-empty
      # regression. Prior workarounds for the CLI symlink / action-bundle
      # entry-point bugs were removed once they landed in putitoutthere@0.1.37.
      - id: plan
        run: |
          npx -y putitoutthere@0.1.37 plan --json | tee plan.json
          test -s plan.json

  build:
    needs: plan
    if: fromJSON(needs.plan.outputs.matrix || '[]')[0] != null
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.matrix) }}
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Rust (if crates)
        if: matrix.kind == 'crates'
        uses: dtolnay/rust-toolchain@stable
      - name: Build crate
        if: matrix.kind == 'crates'
        run: cargo package --manifest-path ${{ matrix.path }}/Cargo.toml --target-dir ${{ matrix.path }}/target
      - name: Setup Python (if pypi)
        if: matrix.kind == 'pypi'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build wheel (maturin)
        if: matrix.kind == 'pypi' && matrix.build == 'maturin'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out ${{ matrix.path }}/dist ${{ matrix.target == 'sdist' && '--sdist' || format('--target {0}', matrix.target) }}
          working-directory: ${{ matrix.path }}
      - name: Build sdist (setuptools/hatch)
        if: matrix.kind == 'pypi' && matrix.build != 'maturin' && matrix.target == 'sdist'
        # hatch-vcs (and setuptools-scm) derive the version from the
        # latest git tag at build time — which at this point is still
        # the *previous* release. putitoutthere's tag creation happens
        # in the publish job, after this build runs. Feed the planned
        # version through the setuptools-scm-compatible env var so the
        # sdist filename matches what we're about to publish instead of
        # ending up as `0.2.13.dev14` etc.
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_COAXER: ${{ matrix.version }}
        run: |
          cd ${{ matrix.path }}
          python -m pip install build
          python -m build --sdist --outdir dist
      - name: Setup Node (if npm)
        if: matrix.kind == 'npm'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build npm package
        if: matrix.kind == 'npm'
        run: |
          cd ${{ matrix.path }}
          npm ci
          npm run build --if-present
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

  publish:
    needs: [plan, build]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      # putitoutthere shells out to `twine upload` for the actual PyPI
      # push, so the publish runner needs Python + twine on PATH.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install twine
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      # putitoutthere creates annotated tags (`git tag -a`), which
      # require committer identity. Hosted runners have none by default.
      - name: Configure git identity for tagging
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - run: npx -y putitoutthere@0.1.37 publish ${{ inputs.dry_run && '--dry-run' || '' }}
        env:
          # NODE_AUTH_TOKEN (not NPM_TOKEN) matches the .npmrc template that
          # actions/setup-node writes when registry-url is set. putitoutthere's
          # preflight also accepts NPM_TOKEN as a fallback, but npm itself
          # reads this name. Store your npm secret under any name — we map it
          # here.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
