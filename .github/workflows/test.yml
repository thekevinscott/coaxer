name: Test

on:
  push:
    branches: [main]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'tests/**'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'tests/**'
      - '.github/workflows/test.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13", "3.14"]
    env:
      UV_FROZEN: "1"
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so `diff-cover` can compute a diff vs. the base ref.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run just test-ci

      - name: Enforce 100% coverage on changed lines
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --prune origin "${{ github.base_ref }}"
          uv run just diff-cover "origin/${{ github.base_ref }}"

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
