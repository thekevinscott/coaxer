site_name: karat
site_description: Evals-first prompt optimization. Label examples, get better prompts.
site_url: https://thekevinscott.github.io/karat/
repo_url: https://github.com/thekevinscott/karat
repo_name: thekevinscott/karat

theme:
  name: material
  palette:
    - scheme: default
      primary: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            members_order: source

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Overview: index.md
  - Guide:
      - Getting Started: guide/getting-started.md
      - Labeling TUI: guide/labeling-tui.md
      - Optimize Skill: guide/optimize-skill.md
      - Caching: guide/caching.md
  - API Reference:
      - AgentLM: api/agent-lm.md
      - load_predict: api/load-predict.md
      - CLI: api/cli.md
  - llms.txt: llms-full.md
