site_name: coaxer
site_description: Label examples. Derive the prompt. Consume it as a string.
site_url: https://thekevinscott.github.io/coaxer/
repo_url: https://github.com/thekevinscott/coaxer
repo_name: thekevinscott/coaxer

theme:
  name: material
  palette:
    - scheme: default
      primary: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            members_order: source

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Overview: index.md
  - Guide:
      - Getting Started: guide/getting-started.md
      - Caching: guide/caching.md
  - API Reference:
      - CoaxPrompt: api/coax-prompt.md
      - CLI: api/cli.md
      - AgentLM: api/agent-lm.md
      - OpenAILM: api/openai-lm.md
  - llms.txt: llms-full.md
