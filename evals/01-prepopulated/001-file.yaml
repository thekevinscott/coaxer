timestamp: 2026-03-24T00:00:00Z
name: 01-prepopulated
domain: functional
prompt: |
  I have 3 text examples I want to label for sentiment.
  The texts are: "I am happy", "This is terrible", "It was okay I guess".
  The labels should be positive or negative.
  Pre-populate the labels with your best guesses.
  Write the labeling file so I can use karat label.
expected: |
  Should use the Write tool to save a JSON file with the unified fields format:
  - A "fields" array (NOT "label_fields"/"display_fields" legacy format)
  - A display field for the text (no "labels" key)
  - A label field for sentiment with "labels": ["positive", "negative"] or similar
  - An "examples" array with exactly 3 items
  - Each example should have the sentiment field PRE-POPULATED with the agent's prediction (e.g., "positive", "negative")
  - The pre-populated values must be strings matching one of the labels options
